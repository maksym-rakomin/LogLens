services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: logLens-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-loglens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loglens_password}
      POSTGRES_DB: ${POSTGRES_DB:-loglens}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loglens} -d ${POSTGRES_DB:-loglens}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loglens-network

  # NestJS API
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: loglens-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-loglens}:${POSTGRES_PASSWORD:-loglens_password}@db:5432/${POSTGRES_DB:-loglens}
      PORT: ${API_PORT:-4000}
      NODE_ENV: ${NODE_ENV:-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "${API_PORT:-4000}:${API_PORT:-4000}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${API_PORT:-4000}/api || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - loglens-network
    volumes:
      - api_logs:/app/apps/api/logs

  # Next.js Web Frontend
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: loglens-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_SERVER: ${NEXT_PUBLIC_API_SERVER:-http://localhost:4000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - loglens-network

volumes:
  postgres_data:
    driver: local
  api_logs:
    driver: local

networks:
  loglens-network:
    driver: bridge
